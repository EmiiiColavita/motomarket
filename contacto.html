<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | MotoMarket</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">🏍️ MotoMarket</div>

    <div class="search-box">
        <input type="text" placeholder="Buscar repuestos...">
        <button>Buscar</button>
    </div>
</header>

<!-- NAVBAR -->
<nav class="navbar">
    <ul>
        <li><a href="index.html">Inicio</a></li>
        <li>Repuestos</li>
        <li>Accesorios</li>
        <li>Ofertas</li>
        <li><a href="contacto.html">Contacto</a></li>
    </ul>
</nav>

<!-- CONTENEDOR -->
<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h3>Categorías</h3>
        <ul>
            <li>Cascos</li>
            <li>Aceites</li>
            <li>Frenos</li>
            <li>Baterías</li>
            <li>Luces</li>
            <li>Accesorios</li>
        </ul>
    </aside>

    <!-- CONTENIDO CONTACTO -->
    <main class="products">

        <div class="card contact-card">
            <h2>Contacto</h2>

            <form action="https://formspree.io/f/xkokkpbe" method="POST" class="contact-form">

                     <div class="input-group">
                         <span class="icon">👤</span>
                         <input type="text" name="nombre" placeholder="Tu nombre" required>
                     </div>

                    <div class="input-group">
                        <span class="icon">📧</span>
                        <input type="email" name="email" placeholder="Tu email" required>
                    </div>

                    <div class="input-group textarea">
                        <span class="icon">💬</span>
                        <textarea name="mensaje" rows="5" placeholder="Escribí tu mensaje..." required></textarea>
                    </div>

                        <button type="submit">Enviar mensaje</button>

            </form>
        </div>

    </main>

</div>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 MotoMarket</p>
    <p>WhatsApp: 221-000-000</p>
    <p>Instagram: @motomarket</p>
</footer>

</body>
</html>
