<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto - MotoMarket</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h1>MotoMarket</h1>
  </header>

  <section class="contacto">
    <h2>Contacto</h2>

    <form action="https://formspree.io/f/xkokkpbe" method="POST">
      
      <label>Nombre</label>
      <input type="text" name="nombre" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Mensaje</label>
      <textarea name="mensaje" rows="5" required></textarea>

      <button type="submit">Enviar</button>
      
    </form>
  </section>
  </body>
</html>
